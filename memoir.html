<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yingling Files – Memoir</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05050a;
      color: #e5e7eb;
      padding: 24px 16px 40px;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .nav a {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #93c5fd;
      text-decoration: none;
      margin-right: 12px;
    }
    .nav a:hover {
      text-decoration: underline;
    }
    #entry {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.7;
      color: #e5e7eb;
      background: #020617;
      border-radius: 10px;
      padding: 16px 14px;
      border: 1px solid #111827;
      margin-top: 10px;
    }
    select {
      margin-top: 10px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #111827;
      padding: 4px 10px;
      font-size: 12px;
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="nav">
      <a href="index.html">Back to Yingling Files</a>
    </div>
    <h1>Memoir</h1>

    <label for="entry-select">Entry:</label>
    <select id="entry-select">
      <option value="notes/entry-01.txt">Summer Camp – Night 3</option>
      <option value="notes/entry-02.txt">Screenshots – Late session</option>
      <!-- add more as you create new files -->
    </select>

    <div id="entry">Loading…</div>
  </main>

  <script>
    const selectEl = document.getElementById('entry-select');
    const entryEl = document.getElementById('entry');

    async function loadEntry(path) {
      try {
        const res = await fetch(path);
        if (!res.ok) {
          entryEl.textContent = 'Unable to load entry.';
          return;
        }
        const text = await res.text();
        entryEl.textContent = text;
      } catch (e) {
        entryEl.textContent = 'Error loading entry.';
      }
    }

    selectEl.addEventListener('change', () => {
      loadEntry(selectEl.value);
    });

    // initial load
    loadEntry(selectEl.value);
  </script>
</body>
</html>
